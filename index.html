<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Phoenix Business Builder</title>

  <style>
    :root{
      --bg0:#050607;
      --bg1:#0b0e12;
      --panel: rgba(255,255,255,.06);
      --panel2: rgba(255,255,255,.08);
      --text:#f3f5f7;
      --muted: rgba(243,245,247,.75);
      --muted2: rgba(243,245,247,.55);
      --gold:#d1b35a;
      --gold2:#8f7a2e;
      --stroke: rgba(255,255,255,.12);
      --shadow: 0 24px 70px rgba(0,0,0,.55);
      --radius: 22px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; margin:0; }
    body{
      font-family: system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(1200px 700px at 50% 45%, rgba(255,255,255,.06) 0%, rgba(255,255,255,0) 55%),
        radial-gradient(900px 560px at 50% 65%, rgba(209,179,90,.08) 0%, rgba(209,179,90,0) 52%),
        linear-gradient(180deg, var(--bg0), var(--bg1));
      color: var(--text);
      overflow-x:hidden;
    }

    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 28px 18px;
      position:relative;
    }

    .card{
      width:min(980px, 100%);
      border-radius: var(--radius);
      border: 1px solid var(--stroke);
      background: linear-gradient(180deg, var(--panel), rgba(255,255,255,.03));
      box-shadow: var(--shadow);
      padding: clamp(22px, 4vw, 44px);
      position:relative;
      overflow:hidden;
    }

    .card::before{
      content:"";
      position:absolute;
      inset:-2px;
      background:
        radial-gradient(600px 220px at 50% 0%, rgba(209,179,90,.16) 0%, rgba(209,179,90,0) 70%),
        radial-gradient(700px 260px at 50% 120%, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 65%);
      pointer-events:none;
    }

    .inner{
      position:relative;
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap: 14px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom: 4px;
    }

    .brand img{
      width: 22px;
      height: 22px;
      object-fit:contain;
      display:block;
      filter: drop-shadow(0 6px 14px rgba(0,0,0,.55));
    }

    .brand .name{
      font-size: 13px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--muted);
      font-weight: 650;
      line-height: 1;
    }

    .tagline{
      font-size: 12px;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--muted2);
      margin-top: 2px;
    }

    h1{
      margin: 0;
      font-size: clamp(34px, 5vw, 56px);
      line-height: 1.05;
      letter-spacing: -0.02em;
      text-shadow: 0 16px 40px rgba(0,0,0,.55);
    }

    .sub{
      margin: 0;
      font-size: clamp(14px, 2vw, 18px);
      color: var(--muted);
      max-width: 56ch;
    }

    .cta{
      margin-top: 10px;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      justify-content:center;
    }

    .btn{
      appearance:none;
      border: 1px solid rgba(209,179,90,.55);
      background: rgba(0,0,0,.25);
      color: var(--text);
      padding: 12px 22px;
      border-radius: 999px;
      font-weight: 750;
      letter-spacing:.02em;
      cursor:pointer;
      text-decoration:none;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width: 160px;
      transition: transform .12s ease, background .12s ease, border-color .12s ease, box-shadow .12s ease;
      box-shadow: 0 14px 28px rgba(0,0,0,.35);
    }

    .btn:hover{
      transform: translateY(-1px);
      background: rgba(209,179,90,.10);
      border-color: rgba(209,179,90,.75);
      box-shadow: 0 18px 34px rgba(0,0,0,.42);
    }

    .btn:active{
      transform: translateY(0px);
    }

    .footer-left{
      position:absolute;
      left: 18px;
      bottom: 14px;
      font-size: 11px;
      letter-spacing:.12em;
      text-transform: uppercase;
      color: rgba(243,245,247,.45);
    }

    .footer-right{
      position:absolute;
      right: 18px;
      bottom: 14px;
      font-size: 12px;
      color: rgba(243,245,247,.55);
      font-weight: 650;
    }

    /* mobile breathing room */
    @media (max-width: 520px){
      .footer-left, .footer-right{ position:static; margin-top: 14px; }
      .card{ padding-bottom: 26px; }
      .inner{ gap: 12px; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card" aria-label="Phoenix Business Builder landing">
      <div class="inner">

        <div class="brand" aria-label="Brand">
          <img src="LOGO_URL_HERE" alt="Phoenix Crest" />
          <div class="name">Phoenix Crest</div>
        </div>

        <div class="tagline">Start with clarity. Scale with discipline.</div>

        <h1>Phoenix Business Builder</h1>

        <p class="sub">Build real businesses — fast, clean, and correctly.</p>

        <div class="cta">
          <a class="btn" href="GET_STARTED_URL_HERE">Get Started</a>
        </div>

      </div>

      <div class="footer-left">Production</div>
      <div class="footer-right">v1.0.0</div>
    </section>
  </main>
</body>
</html>
