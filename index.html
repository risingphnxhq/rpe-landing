<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PBRS Access</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#0a0a0a;
      --text:#f3f4f6;
      --muted:#b7bec8;
      --gold:#c9a227;
      --gold-soft:#8f741a;
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      width:100%;
      height:100%;
      background:var(--bg);
      color:var(--text);
      overflow:hidden;
    }

    body{
      font-family:"Source Sans 3", Arial, sans-serif;
    }

    .page{
      position:relative;
      width:100%;
      height:100vh;
      min-height:100vh;
      background:var(--bg);
    }

    .seal{
      position:absolute;
      top:34px;
      left:42px;
      width:64px;
      height:auto;
      opacity:0.96;
    }

    .hero{
      width:min(980px, 88vw);
      margin:0 auto;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      transform:translateY(-2.5vh);
    }

    .headline{
      font-family:"Cinzel", serif;
      font-size:clamp(32px, 4.4vw, 68px);
      line-height:1.08;
      letter-spacing:0.06em;
      text-transform:uppercase;
      font-weight:600;
      max-width:980px;
      margin-bottom:28px;
    }

    .subline{
      font-family:"Source Sans 3", Arial, sans-serif;
      font-size:clamp(18px, 1.55vw, 24px);
      line-height:1.45;
      color:var(--muted);
      max-width:760px;
      margin-bottom:36px;
      font-weight:400;
    }

    .price{
      font-family:"Cinzel", serif;
      font-size:clamp(22px, 2vw, 34px);
      line-height:1.1;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:var(--gold);
      margin-bottom:40px;
      font-weight:600;
    }

    .cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:250px;
      padding:17px 34px;
      border:1px solid var(--gold);
      color:var(--text);
      text-decoration:none;
      text-transform:uppercase;
      font-family:"Cinzel", serif;
      font-size:18px;
      letter-spacing:0.1em;
      background:transparent;
      transition:background-color .18s ease, color .18s ease, border-color .18s ease;
      margin-bottom:22px;
    }

    .cta:hover{
      background:var(--gold);
      color:#111;
      border-color:var(--gold);
    }

    .trust{
      font-size:13px;
      line-height:1.45;
      letter-spacing:0.08em;
      text-transform:uppercase;
      color:#8f9398;
      max-width:760px;
    }

    .trust strong{
      color:#c7ccd2;
      font-weight:600;
    }

    @media (max-width: 900px){
      html, body{
        overflow:auto;
      }

      .page{
        min-height:100vh;
        height:auto;
      }

      .seal{
        top:24px;
        left:24px;
        width:54px;
      }

      .hero{
        min-height:100vh;
        height:auto;
        width:min(92vw, 980px);
        padding:120px 0 56px;
        transform:none;
      }

      .headline{
        margin-bottom:22px;
      }

      .subline{
        margin-bottom:28px;
      }

      .price{
        margin-bottom:30px;
      }

      .cta{
        min-width:220px;
        width:min(320px, 80vw);
      }
    }

    @media (max-width: 560px){
      .seal{
        width:48px;
        top:18px;
        left:18px;
      }

      .headline{
        font-size:clamp(26px, 8vw, 40px);
        letter-spacing:0.05em;
      }

      .subline{
        font-size:16px;
      }

      .price{
        font-size:20px;
      }

      .cta{
        font-size:16px;
        padding:15px 22px;
      }

      .trust{
        font-size:11px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <img src="phoenix-os-logo.png" alt="Phoenix OS Seal" class="seal" />

    <section class="hero">
      <h1 class="headline">Phoenix Business Readiness Snapshot</h1>

      <p class="subline">
        Private-access diagnostic for operators evaluating structure, stability, and execution readiness.
      </p>

      <div class="price">$99 · Private Release</div>

      <a class="cta" href="https://buy.stripe.com/https://buy.stripe.com/dRm00ja2k0E44HYeYZfYY07">Unlock Access</a>

      <p class="trust">
        Access is granted after payment confirmation. <strong>NACE</strong> will guide your entry.
      </p>
    </section>
  </main>
</body>
</html>
