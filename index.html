<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Phoenix Business Readiness Snapshot</title>
  <style>
    :root{
      --bg-1:#050A14;
      --bg-2:#071426;
      --bg-3:#0B1D36;
      --panel:rgba(255,255,255,0.035);
      --panel-border:rgba(255,255,255,0.08);
      --text:#F7F9FC;
      --muted:#C7D2E3;
      --soft:#8DA0BC;
      --gold:#F2C94C;
      --gold-2:#D9AE2A;
      --shadow:0 30px 80px rgba(0,0,0,0.45);
    }

    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    html, body{
      width:100%;
      height:100%;
      overflow:hidden;
      font-family: "Inter", Arial, Helvetica, sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 50% 22%, rgba(86,132,214,0.14) 0%, rgba(86,132,214,0.05) 22%, transparent 48%),
        linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
    }

    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      opacity:0.045;
      background-image:
        radial-gradient(rgba(255,255,255,0.85) 0.45px, transparent 0.45px);
      background-size:4px 4px;
      mix-blend-mode:soft-light;
    }

    body{
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .page{
      width:min(1100px, 96vw);
      height:min(94vh, 860px);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .shell{
      width:100%;
      height:100%;
      border-radius:28px;
      border:1px solid rgba(255,255,255,0.06);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.025) 0%, rgba(255,255,255,0.012) 100%);
      box-shadow:var(--shadow);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:44px 42px 38px;
      position:relative;
      overflow:hidden;
    }

    .shell::before{
      content:"";
      position:absolute;
      inset:auto 12% 74% 12%;
      height:1px;
      background:linear-gradient(90deg, transparent 0%, rgba(242,201,76,0.12) 20%, rgba(242,201,76,0.35) 50%, rgba(242,201,76,0.12) 80%, transparent 100%);
    }

    .logo-wrap{
      margin-bottom:26px;
    }

    .logo{
      width:250px;
      max-width:52vw;
      height:auto;
      display:block;
      margin:0 auto;
      filter:
        drop-shadow(0 0 18px rgba(242,201,76,0.10))
        drop-shadow(0 8px 34px rgba(242,201,76,0.10));
    }

    h1{
      font-size:clamp(34px, 4.3vw, 62px);
      line-height:1.02;
      letter-spacing:-1.8px;
      font-weight:700;
      max-width:900px;
      margin-bottom:16px;
    }

    .subhead{
      max-width:820px;
      font-size:clamp(17px, 1.6vw, 24px);
      line-height:1.42;
      color:var(--muted);
      font-weight:400;
      margin-bottom:26px;
    }

    .divider{
      width:72px;
      height:1px;
      background:linear-gradient(90deg, transparent 0%, rgba(242,201,76,0.9) 50%, transparent 100%);
      margin:0 auto 24px;
    }

    .price{
      font-size:clamp(28px, 3vw, 44px);
      line-height:1;
      font-weight:700;
      letter-spacing:-1px;
      color:var(--text);
      margin-bottom:26px;
    }

    .price span{
      color:var(--gold);
      font-weight:700;
    }

    .cta{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:270px;
      padding:18px 34px;
      border-radius:14px;
      background:linear-gradient(180deg, #FFD966 0%, var(--gold) 100%);
      color:#171717;
      text-decoration:none;
      font-size:20px;
      font-weight:700;
      letter-spacing:0.2px;
      box-shadow:0 16px 36px rgba(242,201,76,0.22);
      transition:transform .18s ease, box-shadow .18s ease, filter .18s ease;
      margin-bottom:18px;
    }

    .cta:hover{
      transform:translateY(-1px);
      box-shadow:0 20px 42px rgba(242,201,76,0.28);
      filter:brightness(1.02);
    }

    .trust{
      font-size:13px;
      line-height:1.5;
      letter-spacing:0.6px;
      text-transform:uppercase;
      color:rgba(255,255,255,0.58);
      max-width:760px;
    }

    .trust strong{
      color:rgba(255,255,255,0.74);
      font-weight:600;
    }

    @media (max-width: 900px){
      html, body{
        overflow:auto;
      }

      .page{
        min-height:100vh;
        height:auto;
        padding:14px;
      }

      .shell{
        min-height:calc(100vh - 28px);
        height:auto;
        padding:34px 22px 28px;
        border-radius:22px;
      }

      .logo{
        width:190px;
        max-width:58vw;
      }

      .subhead{
        margin-bottom:22px;
      }

      .price{
        margin-bottom:22px;
      }

      .cta{
        width:100%;
        min-width:0;
      }

      .trust{
        font-size:12px;
      }
    }

    @media (max-width: 560px){
      .logo{
        width:155px;
        max-width:62vw;
      }

      h1{
        letter-spacing:-1.2px;
      }

      .subhead{
        font-size:16px;
      }

      .price{
        font-size:28px;
      }

      .cta{
        font-size:18px;
        padding:16px 24px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="shell">
      <div class="logo-wrap">
        <img src="phoenix-os-logo.png" alt="Phoenix OS Logo" class="logo">
      </div>

      <h1>Phoenix Business Readiness Snapshot</h1>

      <p class="subhead">
        A private-access diagnostic used by serious operators to evaluate structure, stability, and execution readiness.
      </p>

      <div class="divider"></div>

      <div class="price"><span>$99</span> · Private Release</div>

      <a class="cta" href="https://buy.stripe.com/YOUR_LINK_HERE">Unlock Access</a>

      <p class="trust">
        Access is granted after payment confirmation. <strong>NACE</strong> will guide your entry.
      </p>
    </section>
  </main>
</body>
</html>
