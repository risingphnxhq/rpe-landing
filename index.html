<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Phoenix Business Builder</title>
  <style>
    :root{
      --bg:#07070a;
      --fg:#f5f5f7;
      --muted:rgba(245,245,247,.72);
      --stroke:rgba(245,245,247,.16);
      --btn-bg:rgba(245,245,247,.10);
      --btn-bg-hover:rgba(245,245,247,.16);
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      min-height:100vh;
      background: radial-gradient(1200px 600px at 50% 35%, rgba(255,215,120,.10), transparent 60%),
                  linear-gradient(180deg, #050507, var(--bg));
      color:var(--fg);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    /* CENTERING SPINE */
    .wrap{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:48px 16px;
    }

    .card{
      width:min(720px, 92vw);
      text-align:center;
      padding:40px 28px;
      border:1px solid var(--stroke);
      border-radius:24px;
      background: rgba(0,0,0,.35);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 40px rgba(0,0,0,.45);
    }

    .logo{
      width:min(360px, 70vw);
      height:auto;
      display:block;
      margin: 0 auto 18px auto;
      filter: drop-shadow(0 12px 22px rgba(0,0,0,.55));
    }

    h1{
      margin: 10px 0 10px 0;
      font-size: clamp(28px, 4.2vw, 54px);
      letter-spacing: .02em;
      line-height:1.05;
    }

    p{
      margin: 0 0 22px 0;
      color:var(--muted);
      font-size: clamp(14px, 2vw, 18px);
      line-height:1.5;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      padding: 14px 26px;
      border-radius: 999px; /* OVAL */
      border: 1px solid var(--stroke);
      background: var(--btn-bg);
      color: var(--fg);
      text-decoration:none;
      font-weight: 700;
      letter-spacing:.06em;
      text-transform: uppercase;
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
      user-select:none;
    }
    .btn:hover{
      background: var(--btn-bg-hover);
      border-color: rgba(245,245,247,.28);
      transform: translateY(-1px);
    }
    .btn:active{
      transform: translateY(0px);
    }
