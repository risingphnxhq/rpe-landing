<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PBRS Access</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--bg:#0a0a0a;
--text:#f3f4f6;
--muted:#b7bec8;
--gold:#c9a227;
}

*{box-sizing:border-box;margin:0;padding:0;}

html,body{
width:100%;
height:100%;
background:var(--bg);
color:var(--text);
overflow:hidden;
font-family:"Source Sans 3",Arial,sans-serif;
}

/* PAGE */

.page{
position:relative;
width:100%;
height:100vh;
}

/* 🔥 FULL SIZE SEAL TEST */

.seal{
position:absolute;
top:12px;
left:18px;

/* FULL SCALE TEST */
width:160px;

height:auto;
opacity:.97;
}

/* HERO */

.hero{
width:min(1200px,92vw);
margin:0 auto;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;

/* DO NOT CHANGE — PERFECT CENTER */
transform:translateY(-3vh);
padding-top:40px;
}

/* HEADLINE */

.headline{
font-family:"Cinzel",serif;
font-size:clamp(32px,4.4vw,68px);
line-height:1.08;
letter-spacing:.06em;
text-transform:uppercase;
font-weight:600;
max-width:1100px;

/* BELOW SEAL PLANE */
margin-top:78px;
margin-bottom:34px;
}

/* SUBLINE */

.subline{
font-size:clamp(18px,1.55vw,24px);
line-height:1.45;
color:var(--muted);
max-width:760px;
margin-bottom:36px;
}

/* PRICE */

.price{
font-family:"Cinzel",serif;
font-size:clamp(22px,2vw,34px);
letter-spacing:.08em;
text-transform:uppercase;
color:var(--gold);
margin-bottom:40px;
}

/* CTA */

.cta{
display:inline-flex;
align-items:center;
justify-content:center;
min-width:250px;
padding:17px 34px;
border:1px solid var(--gold);
color:var(--text);
text-decoration:none;
text-transform:uppercase;
font-family:"Cinzel",serif;
font-size:18px;
letter-spacing:.1em;
background:transparent;
transition:.18s ease;
margin-bottom:22px;
}

.cta:hover{
background:var(--gold);
color:#111;
}

/* TRUST */

.trust{
font-size:13px;
letter-spacing:.08em;
text-transform:uppercase;
color:#8f9398;
max-width:760px;
margin-bottom:18px;
}

/* FOOTER */

.footer{
position:absolute;
bottom:22px;
width:100%;
text-align:center;
font-size:12px;
letter-spacing:.08em;
color:#6d7176;
}

.footer a{
color:#8a9096;
text-decoration:none;
margin:0 10px;
}

.footer a:hover{color:#c9ccd1;}

</style>
</head>

<body>

<main class="page">

<img src="phoenix-os-logo.png" class="seal">

<section class="hero">

<h1 class="headline">Phoenix Business Readiness Snapshot</h1>

<p class="subline">
Private-access diagnostic for operators evaluating structure, stability, and execution readiness.
</p>

<div class="price">$99 · Private Release</div>

<a class="cta" href="https://buy.stripe.com/https://buy.stripe.com/dRm00ja2k0E44HYeYZfYY07">Unlock Access</a>

<p class="trust">
Access is granted after payment confirmation. <strong>NACE</strong> will guide your entry.
</p>

</section>

<footer class="footer">
© Rising Phoenix Enterprises &nbsp;|&nbsp; <a href="#">Terms</a> &nbsp;|&nbsp; <a href="#">Privacy</a>
</footer>

</main>

</body>
</html>
